name: Sync to Gitee

on:
  # Disabled for this fork: this job mirrors github/alibaba -> gitee/arthas and
  # requires GITEE_PRIVATE_KEY / GITEE_TOKEN secrets that only Alibaba owns, so
  # it can only ever fail here. Kept as manual-only (workflow_dispatch) instead
  # of auto-running on every push. Re-add the `push:` trigger to restore.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Gitee
        uses: Yikun/hub-mirror-action@v1.5
        with:
          src: github/alibaba
          dst: gitee/arthas
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "arthas"
